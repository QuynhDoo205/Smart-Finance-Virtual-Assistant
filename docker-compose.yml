
services:
  postgres_db:
    image: postgres:15-alpine
    container_name: novafinance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: novafinance
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: smart_finance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  nova_backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: novafinance_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://novafinance:securepassword123@postgres_db:5432/smart_finance
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres_db

  nova_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: novafinance_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "5173:80"
    depends_on:
      - nova_backend

volumes:
  pgdata:
